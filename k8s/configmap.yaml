apiVersion: v1
kind: ConfigMap
metadata:
  name: fluxura-config
  namespace: fluxura
data:
  FLUXURA_APP_ENV: "k8s"
  FLUXURA_DATABASE_URL: "postgresql+psycopg://fluxura:fluxura@postgres:5432/fluxura"
  FLUXURA_CELERY_BROKER_URL: "redis://redis:6379/0"
  FLUXURA_CELERY_RESULT_BACKEND: "redis://redis:6379/1"
