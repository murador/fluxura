apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower
  namespace: fluxura
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower
  template:
    metadata:
      labels:
        app: flower
    spec:
      containers:
        - name: flower
          image: mher/flower
          ports:
            - containerPort: 5555
          env:
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
---
apiVersion: v1
kind: Service
metadata:
  name: flower
  namespace: fluxura
spec:
  selector:
    app: flower
  ports:
    - port: 5555
      targetPort: 5555
